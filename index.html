<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Saphir Compagny</title>
  
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <main class="container">

    <header>

      <div>

        <p class="eyebrow">
          CLASSEMENT OFFICIEL
        </p>

        <h1>
          🔷 Saphir Compagny
        </h1>

        <p class="subtitle">
          Classement des intérimaires.
        </p>

      </div>

      <button id="refresh">
        Actualiser
      </button>

    </header>


    <!-- STATISTIQUES -->

    <section class="stats">

      <article>

        <span>
          Nombre d'Intérimaires
        </span>

        <strong id="totalClients">
          —
        </strong>

      </article>


      <article>

        <span>
          Saphirs comptabilisés
        </span>

        <strong id="totalSaphirs">
          —
        </strong>

      </article>


      <article>

        <span>
          Argent total versé aux intérimaires
        </span>

        <strong id="totalArgentClient">
          —
        </strong>

      </article>


      <article>

        <span>
          Dernière mise à jour
        </span>

        <strong id="updatedAt">
          —
        </strong>

      </article>

    </section>


    <!-- PODIUM -->

    <section
      id="podium"
      class="podium">
    </section>


    <!-- CLASSEMENT -->

    <section class="ranking">

      <div class="toolbar">

        <h2>
          Classement complet
        </h2>

        <input
          id="search"
          type="search"
          placeholder="Rechercher un client…"
        >

      </div>


      <div
        id="error"
        class="error"
        hidden>
      </div>


      <div class="table-wrap">

        <table>

          <thead>

            <tr>

              <th>
                Rang
              </th>

              <th>
                Intérimaires
              </th>

              <th>
                Saphirs
              </th>

              <th>
                Argent pour l'Intérimaire
              </th>

            </tr>

          </thead>


          <tbody id="rankingBody">
          </tbody>

        </table>

      </div>

    </section>

  </main>


  <script src="/script.js"></script>

</body>
</html>
